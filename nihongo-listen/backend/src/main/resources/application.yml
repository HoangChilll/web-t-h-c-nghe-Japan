spring:
  application:
    name: nihongo-listen
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nihongo}
    username: ${DATABASE_USER:nihongo}
    password: ${DATABASE_PASSWORD:change-me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-in-production-needs-to-be-long-enough-for-hs512}
    access-expiry-min: ${JWT_ACCESS_EXPIRY_MIN:15}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  crawler:
    base-url: ${CRAWLER_BASE_URL:http://localhost:8000}
    internal-secret: ${CRAWLER_INTERNAL_SECRET:change-me-shared-secret}
  youtube:
    api-key: ${YOUTUBE_API_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.nihongolisten: DEBUG
